name: Bug report
description: Report a defect in NetNosey, WebNosey, plugins, or CI.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        Only describe issues related to authorized, defensive use of this repository.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A clear, short description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact commands, inputs, and sequence.
      placeholder: |
        1. Run ...
        2. Provide ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, command used, and target type.
      placeholder: |
        OS: Ubuntu 24.04
        Python: 3.12
        Command: python NetNosey 127.0.0.1 --authorized
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste stack traces, workflow failures, or screenshots if relevant.
      render: shell
